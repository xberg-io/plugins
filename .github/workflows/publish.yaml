name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate and pack without publishing"
        required: false
        type: boolean
        default: true
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: Publish opencode packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate opencode entrypoints
        run: pnpm run validate:opencode

      - name: Validate manifest versions
        run: scripts/validate-manifests.sh

      - name: Pack opencode packages (validate)
        run: >-
          pnpm
          --filter @xberg-io/opencode-xberg
          --filter @xberg-io/opencode-crawlberg
          --filter @xberg-io/opencode-html-to-markdown
          --filter @xberg-io/opencode-tree-sitter-language-pack
          publish --dry-run --no-git-checks

      - name: Publish opencode packages
        if: ${{ github.event_name == 'release' || inputs.dry_run != true }}
        run: >-
          pnpm
          --filter @xberg-io/opencode-xberg
          --filter @xberg-io/opencode-crawlberg
          --filter @xberg-io/opencode-html-to-markdown
          --filter @xberg-io/opencode-tree-sitter-language-pack
          publish --access public --provenance --no-git-checks
